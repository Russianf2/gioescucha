<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Now Playing · Spotify</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #121212;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 24px 32px;
      overflow-x: hidden;
    }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    .particles {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .particle {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.4;
    }
    .particle:nth-child(1) {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(29,185,84,0.25), transparent);
      top: -10%; left: -10%;
      animation: floatA 20s ease-in-out infinite;
    }
    .particle:nth-child(2) {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(29,185,84,0.15), transparent);
      bottom: -5%; right: -5%;
      animation: floatB 25s ease-in-out infinite;
    }
    .particle:nth-child(3) {
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(29,185,84,0.1), transparent);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: floatC 18s ease-in-out infinite;
    }
    @keyframes floatA {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(60px, 40px); }
      66% { transform: translate(-30px, 80px); }
    }
    @keyframes floatB {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(-50px, -30px); }
      66% { transform: translate(40px, -60px); }
    }
    @keyframes floatC {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-40%, -60%) scale(1.15); }
    }

    #app {
      position: relative; z-index: 1;
      width: 100%; max-width: 1200px;
      margin: 0 auto;
      flex: 1;
      display: flex; flex-direction: column;
      gap: 24px;
    }
    .columns {
      display: flex;
      gap: 24px;
      flex: 1;
      align-items: flex-start;
    }
    .columns > .card { flex: 1; }

    .header { padding: 8px 0; }
    .header h1 {
      font-size: 0.85rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: #b3b3b3;
      display: flex; align-items: center; gap: 8px;
    }
    .header .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #1DB954;
      animation: pulse-dot 1.8s ease-in-out infinite;
    }
    .header .dot.paused { background: #535353; animation: none; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.85); }
    }

    .card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .player {
      flex: 0 0 420px;
      max-width: 480px;
      text-align: center;
    }
    .album-art {
      width: min(320px, 30vw);
      aspect-ratio: 1;
      border-radius: 16px;
      margin: 0 auto 20px;
      display: block;
      box-shadow: 0 0 40px rgba(29, 185, 84, 0.12), 0 8px 32px rgba(0,0,0,0.5);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s ease;
      background: #282828; object-fit: cover;
    }
    .album-art:hover {
      transform: scale(1.015);
      box-shadow: 0 0 60px rgba(29, 185, 84, 0.2), 0 12px 40px rgba(0,0,0,0.6);
    }
    .track-name {
      font-size: clamp(1.15rem, 2.5vw, 1.5rem);
      font-weight: 700; line-height: 1.3;
      margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .track-artist {
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      font-weight: 400; color: #b3b3b3;
      margin-bottom: 20px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .progress-container {
      display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
    }
    .progress-time {
      font-size: 0.75rem; font-weight: 500; color: #9e9e9e;
      min-width: 36px; font-variant-numeric: tabular-nums;
    }
    .progress-time:last-child { text-align: right; }
    .progress-track {
      flex: 1; height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px; position: relative; overflow: hidden;
      cursor: pointer;
    }
    .progress-fill {
      height: 100%; width: 0%;
      border-radius: 2px;
      background: linear-gradient(90deg, #1DB954, #1ed760);
      position: relative; transition: width 0.1s linear;
    }
    .progress-fill::after {
      content: ''; position: absolute; right: -4px; top: 50%;
      transform: translateY(-50%);
      width: 10px; height: 10px; border-radius: 50%;
      background: #ffffff; opacity: 0;
      transition: opacity 0.2s ease;
      box-shadow: 0 0 8px rgba(29,185,84,0.5);
    }
    .progress-track:hover .progress-fill::after { opacity: 1; }
    .nothing-playing { text-align: center; padding: 40px 0; }
    .nothing-playing svg { width: 56px; height: 56px; margin-bottom: 16px; opacity: 0.4; }
    .nothing-playing p { color: #b3b3b3; font-size: 1rem; }

    .btn-spotify {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 24px; border-radius: 50px;
      font-size: 0.9rem; font-weight: 600;
      color: #1DB954;
      background: rgba(29, 185, 84, 0.1);
      border: 1px solid rgba(29, 185, 84, 0.25);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-spotify:hover {
      background: #1DB954; color: #ffffff;
      border-color: #1DB954; transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(29, 185, 84, 0.3);
    }
    .btn-spotify svg { width: 18px; height: 18px; flex-shrink: 0; }

    .btn-login {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 32px; border-radius: 50px;
      font-size: 1rem; font-weight: 700;
      color: #ffffff; background: #1DB954;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: 16px;
    }
    .btn-login:hover {
      background: #1ed760; transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(29, 185, 84, 0.35);
    }

    .login-screen { text-align: center; padding: 48px 0; }
    .login-screen .logo { width: 48px; height: 48px; margin-bottom: 20px; }
    .login-screen h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    .login-screen p { color: #b3b3b3; font-size: 0.95rem; margin-bottom: 4px; }

    /* --- Letra (Lyrics) --- */
    .lyrics-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    .lyrics-header h2 {
      font-size: 0.85rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: #b3b3b3;
    }
    .lyrics-header .status {
      font-size: 0.75rem; color: #6a6a6a; font-weight: 500;
    }
    .lyrics-scroll {
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
      position: relative;
    }
    .lyrics-line {
      font-size: 1.1rem;
      font-weight: 400;
      line-height: 1.8;
      padding: 6px 12px;
      border-radius: 8px;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      color: rgba(255, 255, 255, 0.25);
    }
    .lyrics-line.active {
      color: #ffffff;
      font-weight: 600;
      font-size: 1.2rem;
      background: rgba(29, 185, 84, 0.08);
    }
    .lyrics-line.active::before {
      content: '';
      display: inline-block;
      width: 4px; height: 1.2rem;
      background: #1DB954;
      border-radius: 2px;
      margin-right: 8px;
      vertical-align: middle;
      animation: lyrics-blink 0.8s ease-in-out infinite;
    }
    @keyframes lyrics-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
    .lyrics-line.past {
      color: rgba(255, 255, 255, 0.5);
    }
    .lyrics-line.upcoming {
      color: rgba(255, 255, 255, 0.25);
    }
    .lyrics-placeholder {
      color: #6a6a6a;
      text-align: center;
      padding: 40px 0;
      font-size: 0.9rem;
    }

    .hidden { display: none !important; }
    .fade-enter { animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: #1DB954; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 12px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 1024px) {
      .player { flex: 0 0 360px; }
      .album-art { width: min(280px, 28vw); }
    }
    @media (max-width: 768px) {
      body { padding: 16px; }
      .columns { flex-direction: column; }
      .player { flex: none; max-width: none; }
      .album-art { width: min(260px, 60vw); }
      .card { padding: 20px 16px; border-radius: 16px; }
      .lyrics-line { font-size: 1rem; padding: 5px 8px; }
      .lyrics-line.active { font-size: 1.05rem; }
    }
    @media (max-width: 380px) {
      .album-art { width: min(200px, 65vw); }
      .track-name { font-size: 1rem; }
      .track-artist { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <script>
    /* =============================================
       Configuración
       ============================================= */
    const CLIENT_ID = 'c170ab854dbc4a92b38240ff11a5961a';
    const REDIRECT_URI = window.location.origin + window.location.pathname;
    const SCOPES = 'user-read-currently-playing user-read-recently-played user-read-playback-state';

    /* =============================================
       Demo Data
       ============================================= */
    const DEMO_ALBUM_SVG = 'data:image/svg+xml,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">' +

      '<stop offset="0%" style="stop-color:#1DB954"/>' +
      '<stop offset="100%" style="stop-color:#121212"/>' +
      '</linearGradient></defs>' +
      '<rect width="400" height="400" fill="url(#g)"/>' +
      '<circle cx="200" cy="200" r="80" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>' +
      '<circle cx="200" cy="200" r="40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>' +
      '</svg>'
    );
    const DEMO_SMALL_SVG = 'data:image/svg+xml,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">' +
      '<defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">' +
      '<stop offset="0%" style="stop-color:#1DB954"/>' +
      '<stop offset="100%" style="stop-color:#121212"/>' +
      '</linearGradient></defs>' +
      '<rect width="80" height="80" fill="url(#g)"/>' +
      '<circle cx="40" cy="40" r="16" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>' +
      '</svg>'
    );

    const DEMO_TRACK = {
      item: {
        id: 'demo-track-1', name: 'Midnight Dreams',
        artists: [{ name: 'Neon Waves' }],
        album: { name: 'Electric Nights', images: [{ url: DEMO_ALBUM_SVG, width: 400, height: 400 }] },
        duration_ms: 225000,
        external_urls: { spotify: 'https://open.spotify.com' }
      },
      is_playing: true,
      progress_ms: 42000
    };

    const DEMO_LYRICS_LRC = `[00:00.00] Midnight Dreams — Neon Waves
[00:04.50] Under the stars we lie awake
[00:09.20] Watching the world begin to shake
[00:14.10] Your voice echoes in the night

[00:56.70] Underneath the moonlit skies
[01:01.50] These midnight dreams carry us away
[01:06.30] To a place where we can stay
[01:11.00] Lost in the rhythm of the dark
[01:15.80] Burning bright like a spark
[01:20.60] Take my hand and close your eyes
[01:25.20] Let the stars materialize
[01:29.90] In the silence we belong
[01:34.60] This is where we are strong
[01:39.40] Midnight dreams
[01:44.00] Midnight dreams
[01:48.00]`;

    /* =============================================
       PKCE Helpers
       ============================================= */
    function generateCodeVerifier() {
      const p = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
      const v = crypto.getRandomValues(new Uint8Array(64));
      return Array.from(v).map(x => p[x % p.length]).join('');
    }
    function base64url(i) {
      return btoa(String.fromCharCode(...new Uint8Array(i)))
        .replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
    }
    async function generateCodeChallenge(v) {
      return base64url(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v)));
    }

    /* =============================================
       Auth
       ============================================= */
    const Auth = {
      login() {
        if (!CLIENT_ID) return;
        const verifier = generateCodeVerifier();
        localStorage.setItem('code_verifier', verifier);
        generateCodeChallenge(verifier).then(ch => {
          const p = new URLSearchParams({ client_id: CLIENT_ID, response_type: 'code',
            redirect_uri: REDIRECT_URI, code_challenge_method: 'S256', code_challenge: ch, scope: SCOPES });
          window.location.href = 'https://accounts.spotify.com/authorize?' + p;
        });
      },
      async handleCallback() {
        const p = new URLSearchParams(window.location.search);
        const code = p.get('code');
        if (p.get('error') || !code) return false;
        try {
          const r = await fetch('https://accounts.spotify.com/api/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ grant_type: 'authorization_code', code,
              redirect_uri: REDIRECT_URI, client_id: CLIENT_ID,
              code_verifier: localStorage.getItem('code_verifier') || '' })
          });
          const d = await r.json();
          if (d.access_token) {
            localStorage.setItem('spotify_access_token', d.access_token);
            localStorage.setItem('spotify_refresh_token', d.refresh_token || '');
            localStorage.setItem('spotify_token_expires', String(Date.now() + d.expires_in * 1000));
            window.history.replaceState({}, document.title, REDIRECT_URI);
            return true;
          }
        } catch {}
        return false;
      },
      async refreshToken() {
        const rt = localStorage.getItem('spotify_refresh_token');
        if (!rt) return false;
        try {
          const r = await fetch('https://accounts.spotify.com/api/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ grant_type: 'refresh_token', refresh_token: rt, client_id: CLIENT_ID })
          });
          const d = await r.json();
          if (d.access_token) {
            localStorage.setItem('spotify_access_token', d.access_token);
            if (d.refresh_token) localStorage.setItem('spotify_refresh_token', d.refresh_token);
            localStorage.setItem('spotify_token_expires', String(Date.now() + d.expires_in * 1000));
            return true;
          }
        } catch {}
        return false;
      },
      async ensureValidToken() {
        const t = localStorage.getItem('spotify_access_token');
        if (!t) return false;
        const e = localStorage.getItem('spotify_token_expires');
        if (e && Date.now() > parseInt(e) - 120000) {
          if (!(await Auth.refreshToken())) { Auth.clearTokens(); return false; }
        }
        return true;
      },
      clearTokens() {
        ['spotify_access_token','spotify_refresh_token','spotify_token_expires','code_verifier']
          .forEach(k => localStorage.removeItem(k));
      }
    };

    /* =============================================
       API
       ============================================= */
    const API = {
      async fetch(url) {
        if (!(await Auth.ensureValidToken())) return null;
        const r = await fetch(url, { headers: { Authorization: `Bearer ${localStorage.getItem('spotify_access_token')}` } });
        if (r.status === 401) {
          if (await Auth.refreshToken())
            return fetch(url, { headers: { Authorization: `Bearer ${localStorage.getItem('spotify_access_token')}` } });
          Auth.clearTokens(); return null;
        }
        return r.status === 204 ? null : r;
      },
      async currentlyPlaying() {
        const r = await API.fetch('https://api.spotify.com/v1/me/player/currently-playing');
        try { return r ? await r.json() : null; } catch { return null; }
      }
    };

    /* =============================================
       Lyrics
       ============================================= */
    function parseLRC(lrc) {
      if (!lrc) return null;
      const lines = lrc.trim().split('\n');
      const result = [];
      const re = /\[(\d+):(\d+\.\d+)\](.*)/;
      for (const line of lines) {
        const m = line.match(re);
        if (m) {
          const sec = parseInt(m[1]) * 60 + parseFloat(m[2]);
          const text = m[3].trim();
          if (text) result.push({ time: Math.round(sec * 1000), text });
        }
      }
      return result.length ? result : null;
    }

    let lastLyricsQuery = '';

    async function fetchLyrics(artist, title) {
      const q = `${artist} ${title}`.toLowerCase().trim();
      if (!q || q === lastLyricsQuery) return null;
      lastLyricsQuery = q;

      // Try LRCLIB (synced lyrics)
      const enc = s => encodeURIComponent(s);
      try {
        const r = await fetch(`https://lrclib.net/api/get?artist_name=${enc(artist)}&track_name=${enc(title)}`, {
          signal: AbortSignal.timeout(4000)
        });
        if (r.ok) {
          const d = await r.json();
          if (d.syncedLyrics) {
            const parsed = parseLRC(d.syncedLyrics);
            if (parsed) return { synced: true, lines: parsed };
          }
          if (d.plainLyrics) {
            return { synced: false, text: d.plainLyrics.trim() };
          }
        }
      } catch {}

      // Fallback: lyrics.ovh (plain text)
      try {
        const r = await fetch(`https://api.lyrics.ovh/v1/${enc(artist)}/${enc(title)}`, {
          signal: AbortSignal.timeout(4000)
        });
        if (r.ok) {
          const d = await r.json();
          if (d.lyrics) return { synced: false, text: d.lyrics.trim() };
        }
      } catch {}

      return null;
    }

    /* =============================================
       UI
       ============================================= */
    const UI = {
      els: {},

      init() {
        this.els = {
          loginScreen: document.getElementById('loginScreen'),
          albumArt: document.getElementById('albumArt'),
          trackName: document.getElementById('trackName'),
          trackArtist: document.getElementById('trackArtist'),
          trackInfo: document.getElementById('trackInfo'),
          progressFill: document.getElementById('progressFill'),
          currentTime: document.getElementById('currentTime'),
          totalTime: document.getElementById('totalTime'),
          progressSection: document.getElementById('progressSection'),
          openBtn: document.getElementById('openBtn'),
          nothingPlaying: document.getElementById('nothingPlaying'),
          statusDot: document.getElementById('statusDot'),
          lyricsScroll: document.getElementById('lyricsScroll'),
          lyricsStatus: document.getElementById('lyricsStatus'),
          lyricsPlaceholder: document.getElementById('lyricsPlaceholder'),
          lyricsCard: document.getElementById('lyricsCard')
        };
      },

      showLogin() {
        this.els.loginScreen.classList.remove('hidden');
        this.els.albumArt.classList.add('hidden');
        this.els.trackInfo.classList.add('hidden');
        this.els.progressSection.classList.add('hidden');
        this.els.openBtn.classList.add('hidden');
        this.els.nothingPlaying.classList.add('hidden');
        this.els.lyricsCard.classList.add('hidden');
      },

      showPlayer() {
        this.els.loginScreen.classList.add('hidden');
        this.els.albumArt.classList.remove('hidden');
        this.els.trackInfo.classList.remove('hidden');
        this.els.progressSection.classList.remove('hidden');
        this.els.openBtn.classList.remove('hidden');
        this.els.lyricsCard.classList.remove('hidden');
      },

      renderTrack(data) {
        if (!data || !data.item) { this.showNothingPlaying(); return; }
        const t = data.item;
        this.els.albumArt.src = t.album.images?.[0]?.url || DEMO_ALBUM_SVG;
        this.els.trackName.textContent = t.name;
        this.els.trackArtist.textContent = t.artists?.map(a => a.name).join(', ') || '—';
        this.els.openBtn.href = t.external_urls?.spotify || '#';
        this.els.nothingPlaying.classList.add('hidden');
        this.els.trackInfo.classList.remove('hidden');
        this.els.progressSection.classList.remove('hidden');
        this.els.openBtn.classList.remove('hidden');
        this.els.statusDot.className = data.is_playing ? 'dot' : 'dot paused';
      },

      showNothingPlaying() {
        this.els.nothingPlaying.classList.remove('hidden');
        this.els.trackInfo.classList.add('hidden');
        this.els.progressSection.classList.add('hidden');
        this.els.openBtn.classList.add('hidden');
        this.els.statusDot.className = 'dot paused';
      },

      updateProgress(current, duration) {
        const pct = duration > 0 ? (current / duration) * 100 : 0;
        this.els.progressFill.style.width = Math.min(pct, 100) + '%';
        this.els.currentTime.textContent = formatTime(current);
        this.els.totalTime.textContent = formatTime(duration);
      },

      /* --- Lyrics rendering --- */
      renderLyrics(data) {
        const scroll = this.els.lyricsScroll;
        const status = this.els.lyricsStatus;

        if (!data || !data.lines || data.lines.length === 0) {
          if (data && data.text) {
            // Plain text (no timestamps)
            status.textContent = 'Sin sincronía';
            scroll.innerHTML = data.text.split('\n')
              .filter(l => l.trim())
              .map(l => `<div class="lyrics-line past">${escapeHtml(l.trim())}</div>`)
              .join('');
            scroll.scrollTop = 0;
          } else {
            status.textContent = 'No disponible';
            scroll.innerHTML = `<div class="lyrics-placeholder">Letra no encontrada para esta canción</div>`;
          }
          return;
        }

        // Synced lyrics
        status.textContent = 'Sincronizada';
        scroll.innerHTML = data.lines.map((_, i) =>
          `<div class="lyrics-line upcoming" data-idx="${i}"></div>`
        ).join('');

        // Fill text
        data.lines.forEach((l, i) => {
          const el = scroll.querySelector(`[data-idx="${i}"]`);
          if (el) el.textContent = escapeHtml(l.text);
        });

        scroll.scrollTop = 0;
        this._lyricsData = data;
      },

      updateLyricsHighlight(progressMs) {
        const data = this._lyricsData;
        if (!data || !data.synced || !data.lines) return;

        const scroll = this.els.lyricsScroll;
        const lines = data.lines;
        let activeIdx = -1;

        for (let i = lines.length - 1; i >= 0; i--) {
          if (progressMs >= lines[i].time) { activeIdx = i; break; }
        }

        const items = scroll.querySelectorAll('.lyrics-line');
        items.forEach((el, i) => {
          el.className = 'lyrics-line';
          if (i < activeIdx) el.classList.add('past');
          else if (i === activeIdx) el.classList.add('active');
          else el.classList.add('upcoming');
        });

        // Auto-scroll to active line
        if (activeIdx >= 0) {
          const active = items[activeIdx];
          if (active) {
            const container = scroll;
            const cTop = container.scrollTop;
            const cBot = cTop + container.clientHeight;
            const aTop = active.offsetTop;
            const aBot = aTop + active.offsetHeight;
            if (aTop < cTop || aBot > cBot) {
              active.scrollIntoView({ block: 'center', behavior: 'smooth' });
            }
          }
        }
      },

      setDemoMode() {
        this.renderTrack(DEMO_TRACK);
        UI.els.loginScreen.classList.add('hidden');
        UI.els.albumArt.classList.remove('hidden');
        UI.els.lyricsCard.classList.remove('hidden');
        UI.els.lyricsCard.classList.remove('hidden');
        UI.updateProgress(DEMO_TRACK.progress_ms, DEMO_TRACK.item.duration_ms);

        // Demo lyrics
        const parsed = parseLRC(DEMO_LYRICS_LRC);
        UI.renderLyrics({ synced: true, lines: parsed });
      }
    };

    /* =============================================
       Helpers
       ============================================= */
    function formatTime(ms) {
      if (!ms || ms < 0) return '0:00';
      const s = Math.floor(ms / 1000);
      return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;
    }
    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    /* =============================================
       App
       ============================================= */
    const App = {
      trackState: { id: null, startProgress: 0, startTime: 0, duration: 0, isPlaying: false },
      animFrameId: null, pollId: null,

      async init() {
        UI.init();
        await Auth.handleCallback();
        const hasToken = !!localStorage.getItem('spotify_access_token');

        if (!CLIENT_ID) {
          UI.setDemoMode();
          this.startDemoAnimation();
          return;
        }

        if (hasToken && (await Auth.ensureValidToken())) {
          UI.showPlayer();
          this.startPolling();
          return;
        }

        UI.showLogin();
      },

      login() { Auth.login(); },

      startPolling() {
        this.fetchAndUpdate();
        this.pollId = setInterval(() => this.fetchAndUpdate(), 5000);
      },

      async fetchAndUpdate() {
        if (!(await Auth.ensureValidToken())) {
          this.stopPolling(); UI.showLogin(); return;
        }

        const data = await API.currentlyPlaying();

        if (data && data.item) {
          const changed = data.item.id !== this.trackState.id;
          this.trackState = {
            id: data.item.id, isPlaying: data.is_playing,
            duration: data.item.duration_ms,
            startProgress: data.progress_ms, startTime: Date.now()
          };
          if (changed) {
            UI.renderTrack(data);
            // Fetch lyrics for new track
            const artist = data.item.artists?.map(a => a.name).join(', ') || '';
            const title = data.item.name || '';
            lastLyricsQuery = ''; // force re-fetch
            fetchLyrics(artist, title).then(ly => {
              if (ly) UI.renderLyrics(ly);
              else UI.renderLyrics(null);
            });
          }
          this.startProgressAnimation();
        } else if (data === null && this.trackState.id) {
          this.trackState.id = null;
          UI.showNothingPlaying();
          this.stopProgressAnimation();
        }
      },

      startProgressAnimation() {
        this.stopProgressAnimation();
        const animate = () => {
          if (!this.trackState.isPlaying) {
            UI.updateProgress(this.trackState.startProgress, this.trackState.duration);
            return;
          }
          const elapsed = Date.now() - this.trackState.startTime;
          const current = Math.min(this.trackState.startProgress + elapsed, this.trackState.duration);
          UI.updateProgress(current, this.trackState.duration);
          UI.updateLyricsHighlight(current);
          if (current < this.trackState.duration)
            this.animFrameId = requestAnimationFrame(animate);
        };
        animate();
      },

      stopProgressAnimation() {
        if (this.animFrameId) { cancelAnimationFrame(this.animFrameId); this.animFrameId = null; }
      },

      stopPolling() {
        if (this.pollId) { clearInterval(this.pollId); this.pollId = null; }
        this.stopProgressAnimation();
      },

      startDemoAnimation() {
        this.trackState = {
          id: DEMO_TRACK.item.id, startProgress: DEMO_TRACK.progress_ms,
          startTime: Date.now(), duration: DEMO_TRACK.item.duration_ms, isPlaying: true
        };
        const animate = () => {
          const elapsed = Date.now() - this.trackState.startTime;
          const current = Math.min(this.trackState.startProgress + elapsed, this.trackState.duration);
          UI.updateProgress(current, this.trackState.duration);
          UI.updateLyricsHighlight(current);
          if (current >= this.trackState.duration) {
            this.trackState.startProgress = 0;
            this.trackState.startTime = Date.now();
          }
          this.animFrameId = requestAnimationFrame(animate);
        };
        animate();
      }
    };

    document.addEventListener('DOMContentLoaded', () => App.init());
  </script>
</body>
</html>
